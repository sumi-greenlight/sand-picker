<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">

</head>
<body>

  <!-- Auth Gate -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card glass-panel">
      <h1 class="auth-logo">Sand Picker</h1>
      <p class="auth-subtitle">Enter the access code to continue</p>
      <div class="auth-input-group">
        <input type="password" id="passwordInput" class="glass-input auth-password" placeholder="Access code..." autocomplete="off">
        <button id="authSubmit" class="glass-btn primary">Enter</button>
      </div>
      <p id="authError" class="auth-error hidden"></p>
      <p class="auth-footer">Ask your team lead for the access code</p>
    </div>
  </div>

  <!-- App (hidden until auth) -->
  <div id="appContainer" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <h1 class="logo">Sand Picker</h1>
        <button id="signOutBtn" class="glass-btn small sign-out-btn" title="Lock">Lock</button>
      </div>
      <p class="subtitle">Add names, then watch the sand decide</p>

      <div class="input-group">
        <input type="text" id="itemInput" class="glass-input" placeholder="Add a name..." autocomplete="off">
        <button id="addBtn" class="glass-btn primary">Add</button>
      </div>

      <div class="bulk-toggle">
        <button id="bulkToggle" class="glass-btn secondary small">Paste multiple</button>
      </div>

      <div id="bulkArea" class="bulk-area hidden">
        <textarea id="bulkInput" class="glass-input" placeholder="One name per line..." rows="4"></textarea>
        <button id="bulkAddBtn" class="glass-btn primary small">Add all</button>
      </div>

      <div class="nearby-toggle">
        <button id="nearbyToggle" class="glass-btn secondary small">Find nearby places</button>
      </div>

      <div id="nearbyArea" class="nearby-area hidden">
        <div class="nearby-controls">
          <select id="placeType" class="glass-select">
            <option value="restaurant">Restaurants</option>
            <option value="cafe">Cafes</option>
            <option value="bar">Bars</option>
            <option value="fast_food">Fast Food</option>
            <option value="pub">Pubs</option>
            <option value="ice_cream">Ice Cream</option>
          </select>
          <select id="placeRadius" class="glass-select">
            <option value="500">500m</option>
            <option value="1000" selected>1 km</option>
            <option value="2000">2 km</option>
            <option value="5000">5 km</option>
            <option value="10000">10 km</option>
            <option value="20000">20 km</option>
          </select>
          <select id="placeLimit" class="glass-select">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="50">Top 50</option>
          </select>
        </div>
        <div class="location-input-group">
          <input type="text" id="locationInput" class="glass-input" placeholder="City or address..." autocomplete="off">
          <button id="searchLocationBtn" class="glass-btn primary small">Search</button>
        </div>
        <button id="locateBtn" class="glass-btn secondary small locate-btn">
          <span class="locate-icon">&#9737;</span> Or use my location
        </button>
        <p id="nearbyStatus" class="nearby-status hidden"></p>
        <ul id="nearbyResults" class="nearby-results hidden"></ul>
        <button id="addAllNearby" class="glass-btn primary small hidden">Add all to list</button>
      </div>

      <div class="items-header">
        <span id="itemCount">0 names</span>
        <button id="clearBtn" class="glass-btn danger small">Clear all</button>
      </div>

      <ul id="itemList" class="item-list"></ul>

      <div class="options">
        <label class="glass-checkbox">
          <input type="checkbox" id="removeWinner">
          <span class="checkmark"></span>
          Remove winner after pick
        </label>
      </div>

      <div class="palette-picker">
        <div class="palette-row">
          <span class="palette-label">Theme</span>
          <button class="mode-toggle glass-btn small" id="modeToggle" title="Toggle light/dark mode">
            <span class="mode-icon" id="modeIcon">&#9790;</span>
          </button>
        </div>
        <div class="palette-swatches" id="palettePicker">
          <button class="swatch active" data-palette="beige" title="Beige"><span style="background:#c8b898"></span></button>
          <button class="swatch" data-palette="rose" title="Rose Gold"><span style="background:#e8a0b4"></span></button>
          <button class="swatch" data-palette="ocean" title="Ocean"><span style="background:#4fc3f7"></span></button>
          <button class="swatch" data-palette="aurora" title="Aurora"><span style="background:#bf5af2"></span></button>
          <button class="swatch" data-palette="mint" title="Mint"><span style="background:#82ddb0"></span></button>
          <button class="swatch" data-palette="mono" title="Mono"><span style="background:#a0a0a0"></span></button>
        </div>
      </div>
    </aside>

    <!-- Main canvas area -->
    <main class="canvas-stage">
      <canvas id="sandCanvas"></canvas>
      <div id="countdownOverlay" class="countdown-overlay hidden"></div>
      <button id="goBtn" class="go-button glass-btn">GO</button>
      <button id="resetBtn" class="reset-button glass-btn secondary hidden">Reset</button>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
